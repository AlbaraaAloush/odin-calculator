<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="calculator-display">
          <p class="output-display"></p>
          <p class="input-display"></p>
        </div>
        <div class="calculator-buttons">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>÷</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>*</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>-</button>
          <button>0</button>
          <button>.</button>
          <button>+</button>
          <button>=</button>
          <button>CLEAR</button>
        </div>
      </div>
    </div>
  </body>
</html>
